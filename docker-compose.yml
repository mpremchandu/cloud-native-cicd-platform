version: '3.9'

services:

  api:
    build: .
    container_name: fastapi_app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - db

    environment:
      DATABASE_URL: ${DATABASE_URL}

  db:
    image: postgres:15

    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasksdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
